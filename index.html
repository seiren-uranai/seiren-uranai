
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>静蓮 | 波動鑑定</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        serif: ['"Times New Roman"', '"YuMincho"', '"Hiragino Mincho ProN"', '"Yu Mincho"', 'serif'],
                    },
                    animation: {
                        'shimmer': 'shimmer 5s infinite',
                    },
                    keyframes: {
                        shimmer: {
                            '0%': { transform: 'translateX(-150%) skewX(-15deg)' },
                            '50%': { transform: 'translateX(150%) skewX(-15deg)' },
                            '100%': { transform: 'translateX(150%) skewX(-15deg)' },
                        },
                    },
                    boxShadow: {
                        'luxury-green': '0 4px 0 #059669, 0 8px 20px rgba(5, 150, 105, 0.4), inset 0 1px 0 rgba(255,255,255,0.4)',
                        'luxury-green-hover': '0 6px 0 #059669, 0 12px 24px rgba(5, 150, 105, 0.5), inset 0 1px 0 rgba(255,255,255,0.4)',
                    }
                }
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body, #root { height: 100%; }
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
        }
        .btn-luxury {
            position: relative;
            overflow: hidden;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-luxury::after {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent 0%, rgba(255,255,255,0.6) 50%, transparent 100%);
            transform: skewX(-20deg) translateX(-200%);
            animation: shimmer 5s infinite;
        }
        .btn-luxury:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #059669, inset 0 2px 4px rgba(0,0,0,0.2) !important;
        }
        @keyframes shimmer {
            0%   { transform: skewX(-20deg) translateX(-200%); }
            50%  { transform: skewX(-20deg) translateX(200%); }
            100% { transform: skewX(-20deg) translateX(200%); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up-1 { animation: fadeUp 0.9s ease forwards; animation-delay: 0.1s; opacity: 0; }
        .fade-up-2 { animation: fadeUp 0.9s ease forwards; animation-delay: 0.4s; opacity: 0; }
        .fade-up-3 { animation: fadeUp 0.9s ease forwards; animation-delay: 0.7s; opacity: 0; }
        .hero-text-shadow { text-shadow: 0 2px 30px rgba(0,0,0,0.6), 0 4px 10px rgba(0,0,0,0.9); }
    </style>
