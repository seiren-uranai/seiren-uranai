<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無料鑑定受付中｜公式LINE</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #f8f9fa; /* 清潔感のある薄いグレー */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }
        .container {
            text-align: center;
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .icon {
            font-size: 50px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.2rem;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            display: block;
            background-color: #06C755; /* LINEカラー */
            color: white;
            text-decoration: none;
            padding: 18px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s;
            box-shadow: 0 4px 10px rgba(6, 199, 85, 0.3);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🔮</div>
    <h1>あなたの未来を鑑定します<br>公式LINEで結果を受け取る</h1>
    
    <a href="https://lin.ee/M4GK1qr" class="btn">
        LINEで無料鑑定を始める
    </a>

    <p class="note">※友だち追加後にメッセージが届きます</p>
</div>

</body>
</html>
